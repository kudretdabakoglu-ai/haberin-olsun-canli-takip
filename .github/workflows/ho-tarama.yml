name: Haberin Olsun — Otomatik Tarama

on:
  schedule:
    - cron: '*/30 * * * *'   # Her 30 dakikada bir
  workflow_dispatch:           # Manuel tetikleme butonu

permissions:
  contents: write

jobs:
  tara:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu çek
        uses: actions/checkout@v4

      - name: Python 3.11 kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Bağımlılıkları yükle
        run: pip install requests

      - name: Tarama yap
        env:
          GETX_API_KEY: ${{ secrets.GETX_API_KEY }}
        run: python ho_scan_once.py

      - name: Sonuçları kaydet (commit & push)
        run: |
          git config user.name "Haberin Olsun Bot"
          git config user.email "bot@noreply.com"
          git add results.json
          git diff --staged --quiet || git commit -m "Tarama: $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push
